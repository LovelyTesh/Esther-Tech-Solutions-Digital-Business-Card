<!DOCTYPE html>
<html>
<head> 
    <title>My Digital Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" onclick="this.classList.toggle('flipped')">
    <div class="card-inner">
        <!-- FRONT -->
        <div class="card-front">
            <h1>Letesha Gordon</h1>
            <p class="role">Software Developer</p>
            <p class="tagline">Building Clean, Modern Experiences</p>
        </div>
         <!-- BACK -->
        <div class="card-back">
            <!-- HiHello QR Code -->
            <h2>Scan to connect</h2>
            <a href="https://hihello.com/p/fa7f9e37-d7c7-4c3e-b57c-1f153b2115f9" target="_blank">
                <img src="hihello-qr.png"
                     alt="HiHello QR Code"
                     width="120">
            </a> 
        </div> 
    </div>
</div>
</body>
</html>
